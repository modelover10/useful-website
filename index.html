  </div>
</div>

<div class="main-page" id="main">

<div class="toast" id="toast"></div>

<script>
// 页面切换
const start = document.getElementById('start');
const theme = document.getElementById('theme');
const main = document.getElementById('main');
document.getElementById('goTheme').onclick = () => { start.style.display='none'; theme.style.display='flex'; }
document.querySelectorAll('.theme-item').forEach(el=>{
  el.onclick = () => {
    main.className='main-page '+el.dataset.theme;
    theme.style.display='none'; main.style.display='block'; rand();
  }
})

let currentTag='all';
const sentenceEl=document.getElementById('sentence');

function rand(){
  const list=sentences[currentTag];
  sentenceEl.innerText=list[Math.floor(Math.random()*list.length)];
}

document.querySelectorAll('.tag').forEach(t=>{
  t.onclick=()=>{
    document.querySelectorAll('.tag').forEach(x=>x.classList.remove('active'));
    t.classList.add('active'); currentTag=t.dataset.tag; rand();
  }
})

document.getElementById('random').onclick=rand;

document.getElementById('copy').onclick=()=>{
  navigator.clipboard.writeText(sentenceEl.innerText);
  showToast("已复制");
}

document.getElementById('star').onclick=()=>{
  const v=sentenceEl.innerText;
  let arr=JSON.parse(localStorage.getItem('coll'))||[];
  if(!arr.includes(v))arr.push(v);
  localStorage.setItem('coll',JSON.stringify(arr));
  renderColl(); showToast("已收藏");
}

function renderColl(){
  const c=document.getElementById('collection');
  const arr=JSON.parse(localStorage.getItem('coll'))||[];
  c.innerHTML=arr.map(i=>`<div class="coll-item body-font">• ${i}</div>`).join('');
}

function showToast(text){
  const t=document.getElementById('toast');
  t.innerText=text; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1500);
}
